<html>
<head>
<meta charset="UTF-8">
<title>Urgent Action</title>

<style>
body{
font-family:Arial;

color:white;
text-align:center;
padding-top:100px;
}
button{
background:#e00000;
border:none;

<body>

<h1>Urgent Human Rights Appeal</h1>
<p>Click below to open the prepared email</p>

<button onclick="sendMail()">SEND EMAIL</button>

<script>

function sendMail(){

let emails = 'larry_burton@sullivan.senate.gov,erik_elam@sullivan.senate.gov,angela_ramponi@murkowski.senate.gov,kaitlin_stoddard@tuberville.senate.gov,daniel_burgess@boozman.senate.gov,drew_hudson@cotton.senate.gov,katie_campbell@kelly.senate.gov,joshua_esquivel@padilla.senate.gov,kate_cassling@hickenlooper.senate.gov,amy_friedman@bennet.senate.gov,emily_smith@murphy.senate.gov,brian_steele@blumenthal.senate.gov,elizabeth_hunsaker@coons.senate.gov,jonathan_foltz@rickscott.senate.gov,anna_cullen@ossoff.senate.gov,josh_delaney@warnock.senate.gov,jed_dercole@hirono.senate.gov,arun_revana@schatz.senate.gov,molly_carpenter@crapo.senate.gov,charles_adams@risch.senate.gov,katrina_petrone@durbin.senate.gov'
let subject = "URGENT: Executions and Disappearances of Detainees in Iran";

let body = `Dear Sir or Madam,

We write to you as concerned members of the Iranian community and supporters of freedom and democracy for the people of Iran. This message is intended to convey the deep and unwavering desire of millions of Iranians for fundamental political change, human rights, and democratic governance in our homeland.

For more than four decades, the Iranian people have endured severe political repression, economic hardship, and systematic violations of basic human rights under the rule of the Islamic Republic. Despite these conditions, the people of Iran have repeatedly demonstrated extraordinary courage by raising their voices in peaceful protests and civil resistance, demanding freedom, dignity, and a democratic future.

Across Iran and throughout the Iranian diaspora, there is a growing movement that calls for a peaceful transition toward a democratic, secular, and accountable government that respects the rule of law and the fundamental rights of all citizens. The Iranian people seek a future in which their nation can once again take its place among free and democratic societies.

Many Iranians recognize Crown Prince Reza Pahlavi as an important advocate for democratic transition, national unity, and the peaceful restoration of democratic institutions in Iran. His consistent calls for non-violent change, respect for human rights, and national reconciliation have resonated with many who aspire to a free and stable Iran.

We respectfully ask democratic governments, policymakers, and international institutions to listen carefully to the voices of the Iranian people and to support their legitimate aspirations for freedom, justice, and self-determination. The global community has a vital role in standing with the Iranian people as they pursue a peaceful path toward democracy.

History has shown that the pursuit of liberty cannot be suppressed indefinitely. The people of Iran deserve the same rights, opportunities, and freedoms enjoyed by citizens of democratic nations around the world.

We thank you for your attention to this matter and for your commitment to the universal values of human rights and democracy.

`;

window.location.href =
"mailto:" + emails +
"?subject=" + encodeURIComponent(subject) +
"&body=" + encodeURIComponent(body);

}

</script>
